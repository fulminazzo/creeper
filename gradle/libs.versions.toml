[versions]
# PLUGINS
kotlin_jvm = "2.3.0"
buildconfig = "6.0.9"
serialization = "2.3.21"

# DATA FORMAT
json = "1.11.0"

# TESTING
mockk = "1.14.9"

[libraries]
# DATA FORMAT
json = { module = "org.jetbrains.kotlinx:kotlinx-serialization-json", version.ref = "json" }

# TESTING
mockk = { module = "io.mockk:mockk", version.ref = "mockk" }

[plugins]
kotlin_jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin_jvm" }
buildconfig = { id = "com.github.gmazzo.buildconfig", version.ref = "buildconfig" }
serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "serialization" }
